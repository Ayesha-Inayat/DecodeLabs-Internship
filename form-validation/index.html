<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Form | Design & Validation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <form id="registrationForm" class="form">
            <h2>Create Account</h2>
            <p class="subtitle">Join our community today</p>
            
            <div id="successMessage" class="success-banner hidden">
                Registration successful! Welcome aboard.
            </div>

            <div class="form-control">
                <div class="label-row">
                    <label for="fullname">Full Name</label>
                    <span id="charCount" class="char-count">0/30</span>
                </div>
                <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name" maxlength="30">
                <small class="error-message"></small>
            </div>

            <div class="form-control">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
                <small class="error-message"></small>
            </div>

            <div class="form-control">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="password">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <div class="strength-meter">
                    <div class="strength-bar"></div>
                </div>
                <small id="strengthText" class="strength-text"></small>
                <small class="error-message"></small>
            </div>

            <div class="form-control">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="confirmPassword">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <small class="error-message"></small>
            </div>

            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>
    <script src="script.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
